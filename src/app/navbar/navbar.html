<header class="navbar-shadow p-3 mb-4">
<div class="container flex justify-content-between align-items-center">
<a  routerLink="/" class="navbar-logo flex gap-2 align-items-center">
<img ngSrc="logo-prompt-hub.png" alt="logo" width="36"  height="36">
Prompt Hub : SKdev !
</a>
<div class="align-items-center flex gap-3">
@if(authservice.currentUser(); as currentUser){
  <span class="text-sm ">{{ currentUser.username }}</span>
  <p-button (onClick)="logout()" label="" size="small" icon="pi pi-sign-out"/>
}@else {
  <p-button routerLink="/auth" label="" size="small" icon="pi pi-sign-in"/>
}
  <p-button [icon]="isDark() ? 'pi pi-sun' : 'pi pi-moon' " size="small" severity="secondary" (onClick)="toggledarkmode()"></p-button>
  <p-button routerLink="/prompts/create" label="Ajouter" icon="pi pi-plus" size="small"/>
</div>
  </div>
</header>
