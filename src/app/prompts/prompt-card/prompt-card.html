<p-card class="mb-4">
      <div class="flex justify-content-between align-items-center mb-2">
        <div>
          <h3 class="m-0">{{prompt().title}}</h3>
            <div class="text-sm text-color-secondary">@{{prompt().author.username}}</div>
        </div>
        <div class=" flex gap-2">
          <p-button icon="pi pi-pencil" size="small" [text]="true" /> <!-- [text]=true pour ne pas afficher le background du bouton -->
          <p-button icon="pi pi-copy" (onClick)="copyToClipBord()" size="small" [text]="true" /> <!-- [text]=true pour ne pas afficher le background du bouton -->
        </div>
      </div>
      <textarea pTextarea readonly class="w-full mb-2" rows="8">{{prompt().content}}</textarea>
      <div class="flex justify-content-between">
        <p-tag [value]="prompt().category.name" severity="secondary" ></p-tag>
        <div class="flex gap-2 align-items-center">{{prompt().category.name}}
           <p-button severity="secondary" icon="pi pi-thumbs-up" size="small" />
           <span>{{prompt().score}}</span>
           <p-button severity="secondary" icon="pi pi-thumbs-down" size="small" />
        </div>
      </div>
</p-card>
